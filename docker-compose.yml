name: rai_website

services:
  postgres:
    image: postgres:16-alpine
    container_name: rai_website_postgres
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rai_website}
      - POSTGRES_USER=${POSTGRES_USER:-robot_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-securepassword}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robot_admin} -d ${POSTGRES_DB:-rai_website}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: rai_website_server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-robot_admin}:${POSTGRES_PASSWORD:-securepassword}@postgres:5432/${POSTGRES_DB:-rai_website}
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_change_in_production}
      - JWT_ACCESS_EXPIRE_MIN=${JWT_ACCESS_EXPIRE_MIN:-1440}
      - ZMQ_SCADA_HOST=${ZMQ_SCADA_HOST:-25.12.4.101}
      - ZMQ_SCADA_HOSTS=${ZMQ_SCADA_HOSTS:-}
      - JETSON_API_URL=${JETSON_API_URL:-http://25.12.4.100:8080}
      - TRAINING_API_URL=${TRAINING_API_URL:-http://host.docker.internal:8081}
      - ANALYTICS_COLLECT_INTERVAL_SEC=${ANALYTICS_COLLECT_INTERVAL_SEC:-5}
      - ANALYTICS_RETENTION_HOURS=${ANALYTICS_RETENTION_HOURS:-168}
      - WEBSITE_LOG_BUFFER_SIZE=${WEBSITE_LOG_BUFFER_SIZE:-500}
      - FACE_MATCH_THRESHOLD=${FACE_MATCH_THRESHOLD:-0.78}
      - FACE_AUTH_SHARED_SECRET=${FACE_AUTH_SHARED_SECRET:-}
      - FACE_DATA_DIR=${FACE_DATA_DIR:-/app/data/faces}
      - FACE_MIN_IMAGES=${FACE_MIN_IMAGES:-8}
      - FACE_MAX_IMAGES=${FACE_MAX_IMAGES:-20}
      - DATASET_DATA_DIR=${DATASET_DATA_DIR:-/app/data/datasets}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_VLM_MODEL=${OLLAMA_VLM_MODEL:-}
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-llama3.1}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./server:/app
      - ./server/data/faces:/app/data/faces
      - ./server/data/datasets:/app/data/datasets
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: rai_website_client
    restart: always
    depends_on:
      - server
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"

volumes:
  pgdata:
