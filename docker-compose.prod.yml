services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    image: ${SERVER_IMAGE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRE_MIN: ${JWT_ACCESS_EXPIRE_MIN:-30}
      JWT_REFRESH_EXPIRE_DAYS: ${JWT_REFRESH_EXPIRE_DAYS:-7}
      DEFAULT_ADMIN_USER: ${DEFAULT_ADMIN_USER:-admin}
      DEFAULT_ADMIN_PASS: ${DEFAULT_ADMIN_PASS}
      ZMQ_SCADA_HOST: ${ZMQ_SCADA_HOST}
      ZMQ_SCADA_HOSTS: ${ZMQ_SCADA_HOSTS:-}
      ZMQ_CMD_PORT: ${ZMQ_CMD_PORT:-5555}
      ZMQ_TELEMETRY_PORT: ${ZMQ_TELEMETRY_PORT:-5556}
      ZMQ_CAMERA_PORT: ${ZMQ_CAMERA_PORT:-5557}
      JETSON_API_URL: ${JETSON_API_URL}
      TRAINING_API_URL: ${TRAINING_API_URL:-http://host.docker.internal:8081}
      ANALYTICS_COLLECT_INTERVAL_SEC: ${ANALYTICS_COLLECT_INTERVAL_SEC:-5}
      ANALYTICS_RETENTION_HOURS: ${ANALYTICS_RETENTION_HOURS:-168}
      WEBSITE_LOG_BUFFER_SIZE: ${WEBSITE_LOG_BUFFER_SIZE:-500}
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.78}
      FACE_AUTH_SHARED_SECRET: ${FACE_AUTH_SHARED_SECRET:-}
      FACE_DATA_DIR: /app/data/faces
      FACE_MIN_IMAGES: ${FACE_MIN_IMAGES:-8}
      FACE_MAX_IMAGES: ${FACE_MAX_IMAGES:-20}
      DATASET_DATA_DIR: /app/data/datasets
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_VLM_MODEL: ${OLLAMA_VLM_MODEL:-}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-llama3.1}
      SSH_ENABLED: ${SSH_ENABLED:-false}
      SSH_JETSON_HOST: ${SSH_JETSON_HOST:-}
      SSH_JETSON_PORT: ${SSH_JETSON_PORT:-22}
      SSH_JETSON_USER: ${SSH_JETSON_USER:-}
      SSH_RASPI_HOST: ${SSH_RASPI_HOST:-}
      SSH_RASPI_PORT: ${SSH_RASPI_PORT:-22}
      SSH_RASPI_USER: ${SSH_RASPI_USER:-}
      SSH_CONNECT_TIMEOUT_SEC: ${SSH_CONNECT_TIMEOUT_SEC:-10}
    volumes:
      - face-data:/app/data/faces
      - dataset-data:/app/data/datasets
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  client:
    image: ${CLIENT_IMAGE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      PORT: 3000
    ports:
      - "3000:3000"

name: rai_website

volumes:
  pgdata:
  face-data:
  dataset-data:
