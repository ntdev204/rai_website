name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master
      - develop

jobs:
  server:
    name: Server checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('website/server/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke import app
        env:
          DATABASE_URL: postgresql+asyncpg://robot_admin:securepassword@localhost:5432/robot_dashboard
          JWT_SECRET: ci-secret
        run: python -c "from app.main import app; print(app.title)"

      - name: Compile Python sources
        run: python -m compileall app

      - name: Build server image
        run: docker build -t website-server-ci .

  client:
    name: Client checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
        run: npm run build

      - name: Build client image
        run: docker build -t website-client-ci .
