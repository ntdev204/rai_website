name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/website-server
  CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/website-client

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lower-case owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set image names
        run: |
          echo "SERVER_IMAGE=ghcr.io/${{ steps.owner.outputs.value }}/website-server" >> "$GITHUB_ENV"
          echo "CLIENT_IMAGE=ghcr.io/${{ steps.owner.outputs.value }}/website-client" >> "$GITHUB_ENV"

      - name: Set metadata
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./website/server
          file: ./website/server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
            ${{ env.SERVER_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.SERVER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.SERVER_IMAGE }}:buildcache,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./website/client
          file: ./website/client/Dockerfile
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
            ${{ env.CLIENT_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.CLIENT_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.CLIENT_IMAGE }}:buildcache,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "website/docker-compose.prod.yml"
          target: "${{ secrets.PROD_PATH }}"
          strip_components: 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/website-server
          CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/website-client
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: SERVER_IMAGE,CLIENT_IMAGE,IMAGE_TAG
          script: |
            set -eu
            cd "${{ secrets.PROD_PATH }}"
            echo "${{ secrets.PROD_ENV_FILE }}" > .env
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
