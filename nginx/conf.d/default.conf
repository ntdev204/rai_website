# ------------------------------------------------------------------
# rai-k63.me — Nginx reverse proxy
# Phase 1: HTTP only (use this until SSL cert is obtained)
# Phase 2: Uncomment the HTTPS server block after running certbot
# ------------------------------------------------------------------

# Upstream definitions
upstream client_upstream {
    server client:3000;
}

upstream server_upstream {
    server server:8000;
}

# ── Phase 1: HTTP (also serves ACME challenge for Let's Encrypt) ──
server {
    listen 80;
    server_name rai-k63.me www.rai-k63.me;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # After SSL is obtained, uncomment this to redirect HTTP → HTTPS:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # ── API / WebSocket / Docs → backend server ──
    location /api/ {
        proxy_pass         http://server_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /ws/ {
        proxy_pass         http://server_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /health {
        proxy_pass         http://server_upstream;
        proxy_set_header   Host $host;
    }

    location /docs {
        proxy_pass         http://server_upstream;
        proxy_set_header   Host $host;
    }

    location /openapi.json {
        proxy_pass         http://server_upstream;
        proxy_set_header   Host $host;
    }

    # ── Everything else → Next.js client ──
    location / {
        proxy_pass         http://client_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}


